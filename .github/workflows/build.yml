name: Build EXE

on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: Build
        run: |
          python -m PyInstaller ^
            --onefile ^
            --console ^
            --name 地址处理工具 ^
            main.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 地址处理工具
          path: dist/*.exe
